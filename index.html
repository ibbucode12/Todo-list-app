<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherTasks - Premium Glassmorphic Task Dashboard</title>
    
    <!-- Meta tags for basic SEO -->
    <meta name="description" content="Manage your tasks, track deadlines, and organize your work with AetherTasks - a modern, high-performance glassmorphic todo application.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- SheetJS Library for Excel Support -->
    <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Animated Blurs -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header glass-card animate-fade-in">
            <div class="header-logo">
                <div class="logo-icon-wrapper">
                    <i class="fa-solid fa-cube logo-icon"></i>
                </div>
                <div class="logo-text">
                    <h1>Aether<span>Tasks</span></h1>
                    <p>Elevate Your Productivity</p>
                </div>
            </div>
            
            <div class="header-actions">
                <!-- Theme Toggle Button -->
                <button id="theme-toggle" class="btn-icon glass-btn" title="Toggle Light/Dark Mode" aria-label="Toggle Theme">
                    <i class="fa-solid fa-moon theme-icon-dark"></i>
                    <i class="fa-solid fa-sun theme-icon-light" style="display: none;"></i>
                </button>
                
                <!-- Excel Actions -->
                <button id="export-excel-btn" class="btn glass-btn" title="Export tasks to Excel file">
                    <i class="fa-solid fa-file-excel"></i>
                    <span>Export Excel</span>
                </button>
                
                <button id="import-excel-trigger-btn" class="btn glass-btn" title="Import tasks from Excel file">
                    <i class="fa-solid fa-file-import"></i>
                    <span>Import Excel</span>
                </button>
                
                <!-- Hidden input for Excel file upload -->
                <input type="file" id="import-excel-file-input" accept=".xlsx,.xls" style="display: none;">
            </div>
        </header>

        <!-- DASHBOARD GRID -->
        <main class="dashboard-grid">
            
            <!-- LEFT PANEL: Create & Analytics -->
            <section class="dashboard-sidebar animate-slide-in-left">
                <!-- CREATE TASK CARD -->
                <div class="glass-card creator-card">
                    <h2 class="card-title"><i class="fa-solid fa-circle-plus"></i> New Task</h2>
                    
                    <form id="task-form" autocomplete="off">
                        <!-- Task Title -->
                        <div class="form-group">
                            <label for="task-title">Task Title</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-pen-nib input-icon"></i>
                                <input type="text" id="task-title" placeholder="What needs to be done?" required>
                            </div>
                        </div>

                        <!-- Grid for Priority and Category -->
                        <div class="form-row">
                            <div class="form-group">
                                <label for="task-priority">Priority</label>
                                <div class="select-wrapper">
                                    <i class="fa-solid fa-circle-exclamation input-icon"></i>
                                    <select id="task-priority">
                                        <option value="low">Low</option>
                                        <option value="medium" selected>Medium</option>
                                        <option value="high">High</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="task-category">Category</label>
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-tags input-icon"></i>
                                    <input type="text" id="task-category" placeholder="e.g. Work, Health" list="category-suggestions">
                                    <datalist id="category-suggestions">
                                        <option value="Work">
                                        <option value="Personal">
                                        <option value="Shopping">
                                        <option value="Health">
                                        <option value="Finance">
                                    </datalist>
                                </div>
                            </div>
                        </div>

                        <!-- Due Date and Time -->
                        <div class="form-group">
                            <label for="task-due">Due Date & Time</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-calendar-days input-icon"></i>
                                <input type="datetime-local" id="task-due">
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary" id="add-task-btn">
                            <i class="fa-solid fa-plus"></i> Add Task <span class="shortcut-badge">Enter</span>
                        </button>
                    </form>
                </div>

                <!-- TASK ANALYTICS CARD -->
                <div class="glass-card analytics-card">
                    <h2 class="card-title"><i class="fa-solid fa-chart-simple"></i> Productivity Hub</h2>
                    
                    <div class="analytics-layout">
                        <!-- Circular/Ring Completion Indicator -->
                        <div class="progress-ring-container">
                            <svg class="progress-ring" width="100" height="100">
                                <circle class="progress-ring-circle-bg" stroke="var(--border-muted)" stroke-width="8" fill="transparent" r="42" cx="50" cy="50"/>
                                <circle class="progress-ring-circle" id="progress-circle" stroke="url(#progress-gradient)" stroke-width="8" stroke-dasharray="263.89" stroke-dashoffset="263.89" fill="transparent" r="42" cx="50" cy="50"/>
                                <!-- SVG Gradient definitions for the progress ring -->
                                <defs>
                                    <linearGradient id="progress-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="var(--accent-glow-primary)" />
                                        <stop offset="100%" stop-color="var(--accent-glow-secondary)" />
                                    </linearGradient>
                                </defs>
                            </svg>
                            <div class="progress-percentage-text" id="progress-percentage">0%</div>
                        </div>

                        <!-- Detailed Statistics -->
                        <div class="stat-list">
                            <div class="stat-item">
                                <div class="stat-info">
                                    <span class="stat-label">Total Tasks</span>
                                    <span class="stat-val" id="count-total">0</span>
                                </div>
                                <div class="progress-bar-flat"><div class="progress-fill" id="fill-total" style="width: 0%; background: var(--text-muted)"></div></div>
                            </div>
                            
                            <div class="stat-item">
                                <div class="stat-info">
                                    <span class="stat-label">Active</span>
                                    <span class="stat-val text-active" id="count-active">0</span>
                                </div>
                                <div class="progress-bar-flat"><div class="progress-fill" id="fill-active" style="width: 0%; background: var(--accent-glow-secondary)"></div></div>
                            </div>

                            <div class="stat-item">
                                <div class="stat-info">
                                    <span class="stat-label">Completed</span>
                                    <span class="stat-val text-completed" id="count-completed">0</span>
                                </div>
                                <div class="progress-bar-flat"><div class="progress-fill" id="fill-completed" style="width: 0%; background: var(--accent-glow-primary)"></div></div>
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <button id="clear-completed-btn" class="btn btn-danger glass-btn" disabled>
                        <i class="fa-solid fa-circle-minus"></i> Clear Completed
                    </button>
                </div>
            </section>

            <!-- RIGHT PANEL: Task Viewer, Search & Sorting -->
            <section class="dashboard-content animate-slide-in-right">
                <!-- CONTROLS BAR -->
                <div class="glass-card controls-card">
                    <!-- Search Input -->
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="search-input" placeholder="Search tasks instantly by name or tag...">
                        <button id="clear-search-btn" class="btn-icon" style="display: none;" title="Clear search">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <div class="filters-row">
                        <!-- Filters Tab List -->
                        <div class="filter-tabs" role="tablist">
                            <button class="tab-btn active" data-filter="all" role="tab" aria-selected="true">
                                <i class="fa-solid fa-list-check"></i> All
                            </button>
                            <button class="tab-btn" data-filter="active" role="tab" aria-selected="false">
                                <i class="fa-solid fa-hourglass-half"></i> Active
                            </button>
                            <button class="tab-btn" data-filter="completed" role="tab" aria-selected="false">
                                <i class="fa-solid fa-circle-check"></i> Completed
                            </button>
                        </div>

                        <!-- Sorting Selection -->
                        <div class="sort-selector">
                            <label for="sort-select"><i class="fa-solid fa-arrow-down-wide-short"></i> Sort:</label>
                            <div class="select-wrapper select-sort">
                                <select id="sort-select">
                                    <option value="dueDate">Due Date</option>
                                    <option value="priority">Priority</option>
                                    <option value="name">Task Name</option>
                                    <option value="order">Custom Drag Order</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TASK LIST CONTAINER -->
                <div class="task-list-outer">
                    <ul id="task-list" class="task-list" aria-label="Task list">
                        <!-- Task items generated dynamically in script.js -->
                    </ul>

                    <!-- EMPTY STATE ILLUSTRATION -->
                    <div id="empty-state" class="empty-state animate-fade-in" style="display: none;">
                        <div class="empty-illustration">
                            <!-- Premium Custom SVG Illustration -->
                            <svg viewBox="0 0 200 200" width="160" height="160">
                                <defs>
                                    <linearGradient id="empty-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="var(--accent-glow-primary)" stop-opacity="0.6"/>
                                        <stop offset="100%" stop-color="var(--accent-glow-secondary)" stop-opacity="0.1"/>
                                    </linearGradient>
                                    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                                        <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="rgba(0,0,0,0.15)"/>
                                    </filter>
                                </defs>
                                <circle cx="100" cy="100" r="70" fill="url(#empty-gradient)" filter="url(#shadow)"/>
                                <path d="M70,85 L90,105 L130,65" fill="none" stroke="var(--accent-glow-primary)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" class="animated-checkmark"/>
                                <rect x="55" y="130" width="90" height="8" rx="4" fill="var(--text-muted)" opacity="0.3" class="animated-bar-1"/>
                                <rect x="75" y="145" width="50" height="6" rx="3" fill="var(--text-muted)" opacity="0.2" class="animated-bar-2"/>
                            </svg>
                        </div>
                        <h3>No Tasks Found</h3>
                        <p id="empty-state-text">Ready to achieve your goals? Create a new task on the left control panel to get started!</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- DYNAMIC PORTALS (MODALS) -->
    
    <!-- Delete & Action Confirmation Modal -->
    <div id="confirm-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-content glass-card animate-zoom-in">
            <div class="modal-header">
                <h3 id="modal-title"><i class="fa-solid fa-triangle-exclamation text-danger"></i> Are you sure?</h3>
                <button id="modal-close" class="btn-icon" aria-label="Close modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <p id="modal-desc">This action will permanently delete this task. This cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel-btn" class="btn glass-btn">Cancel</button>
                <button id="modal-confirm-btn" class="btn btn-danger">Confirm</button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION CONTAINER -->
    <div id="toast-container" class="toast-container" aria-live="polite">
        <!-- Toasts are dynamically added/removed in script.js -->
    </div>

    <!-- JavaScript Controller -->
    <script src="script.js"></script>
</body>
</html>
